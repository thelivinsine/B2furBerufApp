<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Genauly</title>
    <script>
      // GitHub Pages has no server-side router, so a direct visit to e.g.
      // /settings serves this 404 page. We encode the requested path into a
      // query string and redirect to the app root, where /spa-redirect.js
      // restores the original URL before the app boots. This is the standard
      // workaround for single-page apps on GitHub Pages:
      // https://github.com/rafgraph/spa-github-pages
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.host + "/?/" +
        l.pathname.slice(1).replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
