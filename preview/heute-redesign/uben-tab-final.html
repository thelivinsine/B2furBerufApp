<!doctype html><html><head><meta charset="utf8"><style>
  :root{

  *{box-sizing:border-box;margin:0}

  .streak b{font-size:15px;font-weight:800;color:var(--warn)}.streak span{font-size:12.5px;color:var(--mfg);font-weight:500}
  .av{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:grid;place-items:center;color:var(--mfg)}
  /* main */
  .main{flex:1;padding:16px 18px 96px;display:flex;flex-direction:column;gap:18px}
  .seg{align-self:center;display:flex;gap:4px;padding:4px;border-radius:999px;background:var(--muted);border:1px solid hsl(223 24% 27%/.7)}
  .seg button{display:inline-flex;align-items:center;gap:7px;border:0;padding:9px 22px;border-radius:999px;font-size:14px;font-weight:700;background:transparent;color:var(--mfg);font-family:inherit}

  .mapwrap{position:relative;border-radius:20px;overflow:hidden;box-shadow:0 1px 0 0 hsl(223 24% 40%/.25) inset,0 16px 34px -18px rgba(0,0,0,.8);border:1px solid hsl(223 24% 30%/.9)}

  .here{position:absolute;transform:translate(-50%,-100%);background:#fff;color:#0c1424;font:800 11px/1 -apple-system,sans-serif;letter-spacing:.02em;padding:4px 8px;border-radius:8px;border:2px solid #2b2433;box-shadow:0 4px 10px -3px rgba(0,0,0,.6);white-space:nowrap}
  .here .t1{position:absolute;left:50%;top:100%;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:5px solid #2b2433}
  .here .t2{position:absolute;left:50%;top:100%;transform:translate(-50%,-2px);border-left:4px solid transparent;border-right:4px solid transparent;border-top:4px solid #fff}

  .steps{display:flex;align-items:flex-start;justify-content:space-between;padding:2px 4px}
  .step{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;position:relative}
  .step .bar{position:absolute;top:11px;left:-50%;width:100%;height:2px;background:var(--border);z-index:0}

  .step:first-child .bar{display:none}
  .step .dot{position:relative;z-index:1;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;border:2px solid var(--border);background:var(--surface);color:var(--mfg)}

  .tile{border:1px solid var(--border);border-radius:20px;background:var(--surface);padding:18px;box-shadow:0 10px 30px -22px rgba(0,0,0,.9)}
