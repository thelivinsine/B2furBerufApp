name: Validate content

# Gate that blocks broken content from reaching main. Runs the content
# linter (duplicate ids, broken dialogue branches, missing fields, dangling
# cross-references, em dashes in copy) on every PR and on pushes to main.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-content:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs (not floating tags) to remove the
      # tag-hijack supply-chain risk, matching pages.yml.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint content
        run: pnpm lint:content

      # FSRS scheduler gate (Learning Engine 26b): asserts src/engine/srs.ts
      # against golden vectors from the py-fsrs reference implementation.
      - name: Test SRS engine
        run: pnpm test:srs

      # Speaking-block matcher gate (Learning Engine #27): pins the tolerant
      # spoken/typed answer matching contract of src/engine/pronounce.ts.
      - name: Test pronounce matcher
        run: pnpm test:pronounce

      # Lint gate (audit D2, s58): rules-of-hooks + TS recommended. Errors
      # block; the compiler-era react-hooks rules are warnings (visible debt).
      - name: Lint
        run: pnpm lint

      # Unit/component smoke suite (audit D3, s58): stores, session composer,
      # search, and the paged-list/debounce behaviors.
      - name: Unit tests
        run: pnpm test:unit

      # Build gate (audit D1, s58): before this, a PR with a type error or a
      # broken import merged green and only failed inside the Pages deploy.
      - name: Build
        run: pnpm build

      # Bundle budget (audit D4, s58): fail if the eager main chunk creeps
      # past its budget again (was 606 kB before the audit; ~330 kB after).
      - name: Check bundle budget
        run: pnpm check:bundle
