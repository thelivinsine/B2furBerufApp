<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Content-Security-Policy in REPORT-ONLY mode: violations are logged to
         the browser console but nothing is blocked. Once the live site is
         confirmed clean, this flips to an enforcing `Content-Security-Policy`.
         GitHub Pages can't set HTTP headers, so a meta tag is the mechanism.
         - connect-src: Supabase REST/auth/functions (+ wss for realtime).
           LanguageTool/LLM providers are called server-side, never from the browser.
         - style-src 'unsafe-inline': required for React inline style props
           (framer-motion, charts, progress ring).
         - fonts are now self-hosted ('self'); no third-party origins. -->
    <meta
      http-equiv="Content-Security-Policy-Report-Only"
      content="default-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <!-- iOS/Android standalone: launch full-screen (no browser address bar) when
         added to the home screen. iOS Safari ignores the manifest `display`
         field for home-screen launch and requires `apple-mobile-web-app-capable`.
         `black-translucent` suits the dark theme + viewport-fit=cover (content
         draws under a transparent status bar; `.pt-safe` already compensates).
         `theme-color` matches the manifest background for a seamless edge. -->
    <meta name="theme-color" content="#0f1729" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Genauly" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Genauly — German that clicks. Master workplace German and ace the Goethe/telc Deutsch B2 Beruf speaking exam."
    />
    <title>Genauly — German that clicks</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
