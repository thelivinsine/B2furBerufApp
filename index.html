<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Content-Security-Policy (enforcing). GitHub Pages can't set HTTP
         headers so a meta tag is the only mechanism. Note: frame-ancestors
         is ignored in meta tags (HTTP-header-only directive) — that's fine,
         it's a defence-in-depth measure only.
         - connect-src: Supabase REST/auth/functions + realtime websocket;
           Cloudflare Turnstile CAPTCHA. LLM providers are server-side only.
         - script-src: Cloudflare Turnstile script alongside self.
         - frame-src: Turnstile renders its challenge in a sandboxed iframe.
         - style-src 'unsafe-inline': required for React inline styles
           (framer-motion, recharts, progress ring).
         - fonts are self-hosted; no third-party font origins. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://challenges.cloudflare.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self' https://challenges.cloudflare.com; frame-src 'self' https://challenges.cloudflare.com; base-uri 'self'; form-action 'self'; object-src 'none'"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <!-- iOS/Android standalone: launch full-screen (no browser address bar) when
         added to the home screen. iOS Safari ignores the manifest `display`
         field for home-screen launch and requires `apple-mobile-web-app-capable`.
         `black-translucent` suits the dark theme + viewport-fit=cover (content
         draws under a transparent status bar; `.pt-safe` already compensates).
         `theme-color` matches the manifest background for a seamless edge. -->
    <meta name="theme-color" content="#0f1729" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Genauly" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Genauly — German that clicks. Master workplace German and ace the Goethe/telc Deutsch B2 Beruf speaking exam."
    />
    <title>Genauly — German that clicks</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
